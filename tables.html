<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>
        table{
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            
        }
        td, th {
            border: 1px solid rgb(127, 63, 63);
            padding: 10px;
        }
        tr:nth-child(even)
         {
            background-color:  #b9b9b9;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <th>Country</th>
            <th>Country CODE</th>
            <th>Email</th>
        </tr>
        <tr>
            <td>INDIA</td>
            <td>IN</td>
            <td>india@google.com</td>
        </tr>
        <tr>
            <td>United States of America</td>
            <td>USA</td>
            <td>usa@google.com</td>
        </tr>
        <tr>
            <td>JAPAN</td>
            <td>JP</td>
            <td>japan@google.com</td>
        </tr>
        <tr>
            <td>CHINA</td>
            <td>CH</td>
            <td>china@google.com</td>
        </tr>
    </table>
</body>
</html>
